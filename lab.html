<script src="app.js"></script>
<div class="card">
    <h2>🔬 Shaybaarka (Lab)</h2>
    <div id="lab-queue">
        <p>Bukaanka sugaya: <span id="lab-patient">-</span></p>
        <p>Nooca baadhitaanka: <span id="lab-test">-</span></p>
    </div>
</div>

<script>
    // Waxay akhrinaysaa xogta 'lab_queue' ee Dhakhtarku soo diray
    db.ref('lab_queue').on('value', (snap) => {
        const p = snap.val();
        document.getElementById('lab-patient').innerText = p ? p.name : "Ma jiro bukaan";
        document.getElementById('lab-test').innerText = p ? p.testType : "N/A";
    });
</script>

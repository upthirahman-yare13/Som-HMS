<script src="app.js"></script>
<div class="card">
    <h2>Dakhliga Maanta: <span id="total">$0</span></h2>
</div>

<script>
    db.ref('patient_history').on('value', (snap) => {
        let total = 0;
        snap.forEach(child => { total += child.val().fee; });
        document.getElementById('total').innerText = "$" + total;
    });
</script>

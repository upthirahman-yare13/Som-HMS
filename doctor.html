<script src="app.js"></script>
<div id="display">
    <h3>Bukaanka: <span id="pName">-</span></h3>
    <p>Qolka: <span id="pRoom">-</span></p>
    <button onclick="finish()">Bukaanka Waa Dhamaaday</button>
</div>

<script>
    db.ref('live_queue').on('value', (snap) => {
        const p = snap.val();
        if(p) {
            document.getElementById('pName').innerText = p.name;
            document.getElementById('pRoom').innerText = p.room;
        } else {
            document.getElementById('pName').innerText = "Ma jiro bukaan";
        }
    });

    function finish() { db.ref('live_queue').remove(); }
</script>

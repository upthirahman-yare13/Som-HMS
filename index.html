<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>CareQueue | Full System</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        /* CSS-kaaga halkan geli */
        .content-section { display: none; }
        .active-section { display: block; }
    </style>
</head>
<body>

    <div class="sidebar-nav">
        <a href="#" onclick="showSection('reception-section')">✍️ Reception</a>
        <a href="#" onclick="showSection('doctor-section')">👨‍⚕️ Dhakhtarka</a>
        <a href="#" onclick="showSection('pharmacy-section')">💊 Farmashiyaha</a>
    </div>

    <div id="reception-section" class="content-section active-section">
        <h2>RECEPTION CONTROL</h2>
        </div>

    <div id="doctor-section" class="content-section">
        <h2>QAYBTA DHAKHTARKA</h2>
        <div class="card">
            <h3>Bukaanka Hadda Sugaya</h3>
            <p>Magaca: <span id="doc-pName">-</span></p>
            <button class="btn" onclick="finishPatient()">Bukaanka Wuu Dhamaaday</button>
        </div>
    </div>

    <div id="pharmacy-section" class="content-section">
        <h2>QAYBTA FARMASHIYAHA</h2>
        <div class="card">
            <h3>Daawada loo qoray</h3>
            <p id="pharmacy-info">Sugid...</p>
        </div>
    </div>

    <script>
        // FUNCTION-KA KALA BEDDELA QAYBAHA
        function showSection(sectionId) {
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.getElementById(sectionId).style.display = 'block';
        }

        // LOGIC-GA DHAKHTARKA (Si toos ah ula socda live_queue)
        db.ref('live_queue').on('value', (snap) => {
            const p = snap.val();
            if(p) {
                document.getElementById('doc-pName').innerText = p.name;
            } else {
                document.getElementById('doc-pName').innerText = "Ma jiro bukaan sugaya";
            }
        });

        function finishPatient() {
            db.ref('live_queue').remove();
            alert("Bukaanka waa la dhammaystiray!");
        }
    </script>
</body>
</html>
